# 애플리케이션(REST API) HTTP 포트
server.port=10100
spring.application.name=jayksss-api

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# Actuator 관리 포트 — Swagger UI / OpenAPI는 이 포트에서 제공 (springdoc)
# Swagger UI: http://localhost:10200/actuator/swagger-ui
# OpenAPI 문서: http://localhost:10200/actuator/openapi
management.server.port=10200
management.endpoints.web.exposure.include=openapi,swagger-ui
springdoc.use-management-port=true

# MySQL 데이터소스 (민감 값은 Jasypt ENC(...) 로만 보관)
# 마스터 키: 환경 변수 JASYPT_ENCRYPTOR_PASSWORD 가 있으면 우선. 없으면 아래 기본값(로컬 IDE 편의용) 사용.
# 스테이징/운영에서는 반드시 JASYPT_ENCRYPTOR_PASSWORD 로 주입하고, 기본값에 의존하지 마세요.
# 평문을 ENC 로 바꾸는 예시 (Gradle 캐시의 jasypt-1.9.3.jar 경로 사용):
#   java -cp .../jasypt-1.9.3.jar org.jasypt.intf.cli.JasyptPBEStringEncryptionCLI input="평문" password=YOUR_MASTER_KEY algorithm=PBEWithMD5AndDES
jasypt.encryptor.algorithm=PBEWithMD5AndDES
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD:jayksss-api-jasypt}

