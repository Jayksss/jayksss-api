# 애플리케이션(REST API) HTTP 포트
server.port=10100
spring.application.name=jayksss-api

# Actuator 관리 포트 — Swagger UI / OpenAPI는 이 포트에서 제공 (springdoc)
# Swagger UI: http://localhost:10200/actuator/swagger-ui
# OpenAPI 문서: http://localhost:10200/actuator/openapi
management.server.port=10200
management.endpoints.web.exposure.include=openapi,swagger-ui
springdoc.use-management-port=true

# MySQL 데이터소스
spring.datasource.url=jdbc:mysql://121.190.129.204:13306/slas?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=slas_user
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate (스키마는 DB DDL로 관리)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
